services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${PGUSER:-memory}
      POSTGRES_PASSWORD: ${PGPASSWORD:-memory}
      POSTGRES_DB: ${PGDATABASE:-memory}
    # Exposed so the host test suite can reach Postgres. Mapped to host 5433 to
    # avoid colliding with any local Postgres already on 5432. The app talks to
    # the DB over the internal network (db:5432), so this mapping is test-only.
    ports:
      - "5433:5432"
    volumes:
      - memory_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-memory} -d ${PGDATABASE:-memory}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    environment:
      PGHOST: db
      PGPORT: 5432
      PGUSER: ${PGUSER:-memory}
      PGPASSWORD: ${PGPASSWORD:-memory}
      PGDATABASE: ${PGDATABASE:-memory}
      # Optional: set to enable bearer auth.
      MEMORY_AUTH_TOKEN: ${MEMORY_AUTH_TOKEN:-}
      # Optional LLM extraction (provider-agnostic). Set ONE key to enable it;
      # with none set, extraction uses the offline deterministic rule path.
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-auto}
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_TIMEOUT: ${LLM_TIMEOUT:-25}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/health').status==200 else 1)\""]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  memory_pgdata:
